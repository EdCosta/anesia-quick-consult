<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#94a3b8" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- Accent glow circle top-right -->
  <circle cx="1050" cy="120" r="300" fill="#0ea5e9" opacity="0.06"/>
  <circle cx="150" cy="530" r="200" fill="#38bdf8" opacity="0.04"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="180" rx="2" fill="url(#accent)" opacity="0.9"/>

  <!-- Logo area -->
  <rect x="80" y="80" width="44" height="44" rx="10" fill="#0ea5e9"/>
  <text x="102" y="113" font-size="26" text-anchor="middle" fill="white">💉</text>

  <!-- App name -->
  <text x="136" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">Anes</text>
  <text x="218" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#0ea5e9" letter-spacing="-0.5">IA</text>

  <!-- Main headline -->
  <text x="100" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">Consultation rapide</text>
  <text x="100" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#0ea5e9">d'anesthésie</tspan>
    <tspan fill="white"> — Pro</tspan>
  </text>

  <!-- Subtitle -->
  <text x="100" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#94a3b8" font-weight="400">
    Procédures · Guidelines · Protocoles · Blocs ALR
  </text>

  <!-- Feature pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="100" y="400" width="180" height="40" rx="20" fill="#0ea5e9" opacity="0.15"/>
    <rect x="100" y="400" width="180" height="40" rx="20" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <text x="190" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7dd3fc" text-anchor="middle" font-weight="500">Recherche rapide</text>

    <!-- Pill 2 -->
    <rect x="296" y="400" width="160" height="40" rx="20" fill="#0ea5e9" opacity="0.15"/>
    <rect x="296" y="400" width="160" height="40" rx="20" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <text x="376" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7dd3fc" text-anchor="middle" font-weight="500">25 médicaments</text>

    <!-- Pill 3 -->
    <rect x="472" y="400" width="180" height="40" rx="20" fill="#0ea5e9" opacity="0.15"/>
    <rect x="472" y="400" width="180" height="40" rx="20" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <text x="562" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7dd3fc" text-anchor="middle" font-weight="500">Calcul de doses</text>

    <!-- Pill 4 -->
    <rect x="668" y="400" width="160" height="40" rx="20" fill="#0ea5e9" opacity="0.15"/>
    <rect x="668" y="400" width="160" height="40" rx="20" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <text x="748" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7dd3fc" text-anchor="middle" font-weight="500">FR · EN · PT</text>
  </g>

  <!-- Right card decoration -->
  <g opacity="0.85">
    <rect x="900" y="200" width="220" height="280" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="916" y="220" width="188" height="6" rx="3" fill="#0ea5e9" opacity="0.8"/>
    <rect x="916" y="242" width="140" height="4" rx="2" fill="#475569"/>
    <rect x="916" y="258" width="160" height="4" rx="2" fill="#475569" opacity="0.7"/>
    <rect x="916" y="274" width="120" height="4" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="916" y="302" width="188" height="1" rx="0.5" fill="#334155"/>
    <rect x="916" y="322" width="130" height="4" rx="2" fill="#38bdf8" opacity="0.6"/>
    <rect x="916" y="338" width="150" height="4" rx="2" fill="#475569" opacity="0.7"/>
    <rect x="916" y="354" width="110" height="4" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="916" y="382" width="188" height="1" rx="0.5" fill="#334155"/>
    <rect x="916" y="402" width="80" height="28" rx="14" fill="#0ea5e9"/>
    <text x="956" y="421" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Ouvrir</text>

    <!-- Second card hint -->
    <rect x="870" y="320" width="220" height="140" rx="16" fill="#162032" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Bottom domain -->
  <text x="100" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#475569" font-weight="400">anesia.app</text>
  <circle cx="210" cy="562" r="3" fill="#0ea5e9" opacity="0.7"/>
  <text x="222" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#475569">Support éducatif · Non substitutif à la pratique clinique</text>
</svg>
