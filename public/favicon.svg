<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: dark navy rounded square -->
  <rect width="100" height="100" rx="22" fill="#0f172a"/>

  <!-- Syringe tilted 45°, centred -->
  <g transform="rotate(-45, 50, 50)">

    <!-- Needle tip -->
    <polygon points="80,47.5 88,50 80,52.5" fill="#e2e8f0"/>

    <!-- Needle shaft -->
    <rect x="68" y="48" width="12" height="4" rx="1" fill="#e2e8f0" opacity="0.9"/>

    <!-- Barrel body -->
    <rect x="20" y="43" width="48" height="14" rx="3.5" fill="#f1f5f9"/>

    <!-- Fluid fill (sky blue) -->
    <rect x="22" y="45" width="30" height="10" rx="2" fill="#38bdf8" opacity="0.75"/>

    <!-- Graduation marks on barrel -->
    <rect x="36" y="43" width="1.5" height="14" fill="#0ea5e9" opacity="0.5"/>
    <rect x="49" y="43" width="1.5" height="14" fill="#0ea5e9" opacity="0.5"/>
    <rect x="62" y="43" width="1.5" height="14" fill="#0ea5e9" opacity="0.5"/>

    <!-- Plunger flange (wider wings) -->
    <rect x="12" y="40" width="10" height="20" rx="2.5" fill="#cbd5e1"/>

    <!-- Plunger rod handle -->
    <rect x="5" y="46.5" width="9" height="7" rx="2" fill="#94a3b8"/>

  </g>
</svg>
